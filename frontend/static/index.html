<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Load Spikes, Slowdowns &amp; Retries</title>
  <style>
    :root {
      --bg: #0e1116;
      --panel: #171c24;
      --border: #262d38;
      --text: #e6edf3;
      --muted: #8b95a4;
      --accent: #58a6ff;
      --good: #3fb950;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    header {
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
    }
    header h1 { margin: 0; font-size: 18px; font-weight: 600; }
    header p { margin: 4px 0 0; color: var(--muted); font-size: 13px; }
    main { padding: 24px; max-width: 960px; margin: 0 auto; }
    .controls {
      display: flex;
      align-items: center;
      gap: 16px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 24px;
    }
    .controls label { color: var(--muted); }
    .controls input {
      width: 72px;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 6px;
      padding: 6px 8px;
      font: inherit;
    }
    button {
      background: var(--accent);
      color: #06121f;
      border: 0;
      border-radius: 6px;
      padding: 8px 18px;
      font: inherit;
      font-weight: 600;
      cursor: pointer;
    }
    button.stop { background: #f85149; color: #1a0606; }
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 12px;
      margin-bottom: 24px;
    }
    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 16px;
    }
    .card .label { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: .04em; }
    .card .value { font-size: 26px; font-weight: 600; margin-top: 4px; }
    .card.goodput .value { color: var(--good); }
    .chart {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
    }
    .chart .label { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: .04em; margin-bottom: 8px; }
    canvas { width: 100%; height: 160px; display: block; }
  </style>
</head>
<body>
  <header>
    <h1>Load Spikes, Slowdowns &amp; Retries</h1>
    <p>Phase 0 — one request flowing end-to-end: browser client → frontend → work queue → backend → completion.</p>
  </header>
  <main>
    <div class="controls">
      <button id="toggle">Start load</button>
      <label>Target QPS <input id="qps" type="number" value="20" min="1" max="200" /></label>
    </div>

    <div class="cards">
      <div class="card goodput">
        <div class="label">Goodput</div>
        <div class="value"><span id="m-goodput">0</span> <small>ops/s</small></div>
      </div>
      <div class="card">
        <div class="label">Started</div>
        <div class="value" id="m-started">0</div>
      </div>
      <div class="card">
        <div class="label">Completed</div>
        <div class="value" id="m-completed">0</div>
      </div>
      <div class="card">
        <div class="label">In flight</div>
        <div class="value" id="m-inflight">0</div>
      </div>
      <div class="card">
        <div class="label">Failed</div>
        <div class="value" id="m-failed">0</div>
      </div>
      <div class="card">
        <div class="label">Queue length</div>
        <div class="value" id="m-queue">0</div>
      </div>
    </div>

    <div class="chart">
      <div class="label">Goodput (ops/s, last 60s)</div>
      <canvas id="goodput-chart"></canvas>
    </div>
  </main>
  <script src="/app.js"></script>
</body>
</html>
