services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    environment:
      REDIS_ADDR: redis:6379
      # Phase 0 defaults: capacity = CONCURRENCY / WORK_LATENCY ≈ 8 / 0.1s = 80 ops/s.
      # Comfortably above the browser client's ~20 QPS, so the system stays healthy.
      CONCURRENCY: "8"
      WORK_LATENCY_MS: "100"
      QUEUE_MODE: "FIFO"
    depends_on:
      - redis

  frontend:
    build: ./frontend
    environment:
      REDIS_ADDR: redis:6379
      PORT: "8080"
    ports:
      - "8080:8080"
    depends_on:
      - redis
