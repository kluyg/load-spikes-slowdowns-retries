services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

  backend:
    build: ./backend
    environment:
      REDIS_ADDR: redis:6379
      # 4 workers x 50ms base latency => capacity ~= 80 ops/s, matching the
      # "Shed your load" post. Latency and the other knobs are live-tunable.
      CONCURRENCY: "4"
    depends_on:
      - redis
    restart: unless-stopped

  frontend:
    build: ./frontend
    environment:
      REDIS_ADDR: redis:6379
      PORT: "8080"
    ports:
      - "8080:8080"
    depends_on:
      - redis
    restart: unless-stopped

  # Optional Tailscale sidecar. Only starts with:  docker compose --profile tailnet up
  # It serves the frontend on your tailnet (https://frontend.<tailnet>.ts.net) by
  # proxying to the frontend service over the Docker network. Needs TS_AUTHKEY in
  # a (gitignored) .env file. The default `docker compose up` runs the plain local
  # stack with no key required, so anyone can run it.
  ts-frontend:
    image: tailscale/tailscale:latest
    profiles: ["tailnet"]
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_HOSTNAME=frontend            # -> https://frontend.<your-tailnet>.ts.net
      - TS_SERVE_CONFIG=/config/serve.json
      - TS_STATE_DIR=/var/lib/tailscale
    volumes:
      - ts-state:/var/lib/tailscale     # persists identity across restarts
      - ./ts-config:/config
    depends_on:
      - frontend
    restart: unless-stopped

volumes:
  ts-state:
