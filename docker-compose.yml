services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    environment:
      REDIS_ADDR: redis:6379
      # 4 workers x 50ms base latency => capacity ~= 80 ops/s, matching the
      # "Shed your load" post. Latency and the other knobs are live-tunable.
      CONCURRENCY: "4"
    depends_on:
      - redis

  frontend:
    build: ./frontend
    environment:
      REDIS_ADDR: redis:6379
      PORT: "8080"
    ports:
      - "8080:8080"
    depends_on:
      - redis
