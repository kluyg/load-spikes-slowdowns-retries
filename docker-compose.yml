services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    environment:
      REDIS_ADDR: redis:6379
      # 4 workers x 50ms base latency => capacity ~= 80 ops/s, matching the
      # "Shed your load" post. Latency and the other knobs are live-tunable.
      CONCURRENCY: "4"
    depends_on:
      - redis

  ts-frontend:
    image: tailscale/tailscale:latest
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_HOSTNAME=frontend            # → https://frontend.<your-tailnet>.ts.net
      - TS_SERVE_CONFIG=/config/serve.json
      - TS_STATE_DIR=/var/lib/tailscale
    volumes:
      - ts-state:/var/lib/tailscale     # persists identity across restarts
      - ./ts-config:/config
    ports:
      - "8080:8080"                     # optional: keeps localhost:8080 working too
    restart: unless-stopped

  frontend:
    build: ./frontend
    environment:
      REDIS_ADDR: redis:6379
      PORT: "8080"
    network_mode: service:ts-frontend   # share the sidecar's network stack
    depends_on:
      - redis
      - ts-frontend

volumes:
  ts-state: